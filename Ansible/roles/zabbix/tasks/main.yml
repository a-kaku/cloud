- name: Install Zabbix repository
  dnf:
    name: https://repo.zabbix.com/zabbix/6.0/rhel/9/x86_64/zabbix-release-6.0-4.el9.noarch.rpm
    state: present

- name: Install Zabbix agent
  dnf:
    name: zabbix-agent2
    state: present

- name: Install Zabbix plugins
  dnf:
    name: zabbix-agent-plugin-*
    state: present

- name: Enable and start Zabbix agent
  systemd:
    name: zabbix-agent2
    enabled: yes
    state: started

