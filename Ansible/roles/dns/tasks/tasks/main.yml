- name: Set DNS search domain
  ansible.builtin.command:
    cmd: nmcli connection modify "System eth0" ipv4.dns-search "{{ dns_search }}"

- name: Set DNS servers
  ansible.builtin.command:
    cmd: nmcli connection modify "System eth0" ipv4.dns "{{ dns_servers | join(' ')}}"

- name: Disable automatic DNS
  ansible.builtin.command:
    cmd: nmcli connection modify "System eth0" ipv4.ignore-auto-dns yes

- name: Restart NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: restarted